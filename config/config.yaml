# Main configuration file for compression benchmarking
defaults:
  - compression_engine: compression_ae
  - benchmark: default
  - _self_

# Global settings
data:
  input_dir: "data/div2k/val"
  output_dir: "results"
  max_images: 10  # Set to null for all images

# Group images into batches for engines whose encoders set supports_batch=True
# (LZ4, TAR). Engines that don't support batching (JPEG, ONNX) ignore this.
# Use -1 to compress every image in a single batch.
batch_size: 1

# Runtime settings
runtime:
  save_compressed_images: false
  save_decoded_images: false
  verbose: true

# Hydra settings
hydra:
  run:
    dir: outputs/${now:%Y-%m-%d_%H-%M-%S}
  job:
    chdir: false
